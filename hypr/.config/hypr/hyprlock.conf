# --- GENERAL ---
general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# --- BACKGROUND ---
background {
    monitor =
    path = /home/mayank/dotfiles/wallpapers/background.jpg   # Path to your image
    blur_passes = 3                              # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vignette = 0.1
    vignette_thickness = 0.3
}

# --- TIME ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 320
    halign = center
    valign = center
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 30
    font_family = JetBrainsMono Nerd Font
    position = 0, 230
    halign = center
    valign = center
}

# --- USER ICON ---
image {
    monitor =
    path = /home/mayank/dotfiles/wallpapers/profile.jpg    # Your profile picture
    size = 120
    border_size = 2
    border_color = rgba(255, 255, 255, 0.5)
    position = 0, 80
    halign = center
    valign = center
}

# --- INPUT FIELD (PASSWORD) ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

